<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👓 Neytra - Spatial AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050a0f;
      --glass-bg: #0a0f14;
      --border-cyan: #00E5FF;
      --border-dark: #1a2530;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --warning: #f59e0b;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .app-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px 16px;
      padding-bottom: 40px;
      width: 100%;
    }

    /* Header */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .brand-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .eye-icon {
      width: 48px;
      height: 48px;
      background: var(--border-cyan);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }
    .eye-icon svg { width: 30px; height: 30px; fill: #000; }
    
    .brand-text-container { display: flex; flex-direction: column; }
    .brand-text {
      font-family: 'Syncopate', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }
    .brand-sub {
      color: var(--border-cyan);
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 600;
      margin-top: 4px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success); box-shadow: 0 0 8px var(--success);
    }
    .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .connection-status.disconnected { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }

    /* Modes Bar */
    .modes-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .mode-pill {
      background: var(--glass-bg);
      border: 1px solid var(--border-dark);
      padding: 8px 18px;
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      cursor: pointer;
    }
    .mode-pill.active {
      border-color: var(--border-cyan);
      color: var(--text-main);
    }
    .mode-pill .indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .mode-pill.active.scan-mode .indicator { background: #a78bfa; }
    .mode-pill.active.quick-mode .indicator { background: #f59e0b; }
    .mode-pill.active.face-mode .indicator { background: #10b981; }

    /* Video Player */
    .video-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #000;
      border: 1px solid var(--border-dark);
    }
    .video-brackets::before, .video-brackets::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border: 2px solid var(--border-cyan);
      pointer-events: none;
      z-index: 10;
    }
    .video-brackets::before { top: 16px; left: 16px; border-right: none; border-bottom: none; }
    .video-brackets::after { bottom: 16px; right: 16px; border-left: none; border-top: none; }
    
    #cam { width: 100%; display: block; border-radius: 16px; min-height: 200px; object-fit: cover;}
    
    .video-status-pill {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      z-index: 5;
    }
    .video-status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #64748b; }
    .video-status-pill.active .dot { background: var(--border-cyan); box-shadow: 0 0 5px var(--border-cyan); }
    .video-status-pill.active { color: var(--border-cyan); }

    /* Custom Cards (AI Narration & Face) */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--border-dark);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }
    .card-label {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .narration-card { border-left: 4px solid var(--border-cyan); }
    .narration-card .card-label { color: var(--border-cyan); }
    
    #output-text {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 400;
    }
    #output-text strong { display: none; } /* Hide old bold labels since we use the card header now */

    /* Faces Container */
    .faces-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .face-pill {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .face-pill.unknown { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }
    .face-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
    .face-pill.unknown .dot { background: var(--warning); }

    /* Buttons row */
    .action-row {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 16px;
      border-radius: 14px;
      font-family: 'Outfit';
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    
    .btn-primary { 
      background: var(--border-cyan); 
      color: #000;
      box-shadow: 0 4px 20px rgba(0, 229, 255, 0.2); 
    }
    .btn-secondary {
      background: var(--glass-bg);
      border: 1px solid var(--border-dark);
      color: var(--text-main);
    }
    .btn-secondary svg { width: 16px; height: 16px; fill: var(--text-muted); }

    /* Voice Command */
    .voice-command-card { text-align: center; }
    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--border-cyan);
      color: var(--border-cyan);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      cursor: pointer;
      position: relative;
    }
    .mic-btn svg { width: 32px; height: 32px; fill: var(--border-cyan); }
    .mic-btn.listening {
      background: rgba(0, 229, 255, 0.1);
      box-shadow: 0 0 30px rgba(0,229,255,0.3);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
      70% { box-shadow: 0 0 0 20px rgba(0,229,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); }
    }

    /* Enrollment Alert */
    .enrollment-alert {
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .enroll-label { color: var(--warning); font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; text-transform: uppercase;}
    .enroll-text { margin-bottom: 16px; font-size: 15px; color: #fff;}
    .enroll-actions { display: flex; gap: 8px; }
    .btn-warn { background: var(--warning); color: #000; padding: 10px 18px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; }
    .btn-muted { background: var(--glass-bg); border: 1px solid var(--border-dark); color: var(--text-muted); padding: 10px 18px; border-radius: 10px; font-weight: 600; cursor: pointer;}
    .btn-warn:active, .btn-muted:active { transform: scale(0.95); }

    /* Footer Stats */
    .footer-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: auto;
      text-align: center;
    }
    .stat-box {
      background: var(--glass-bg);
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      padding: 12px 8px;
    }
    .stat-val { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .stat-box.highlight .stat-val { font-family: 'Syncopate'; font-size: 14px; letter-spacing: 1px; }
    .stat-lbl { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>

<body>
  <div class="app-container">
    
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="brand-container">
        <div class="eye-icon">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
        <div class="brand-text-container">
          <div class="brand-text">Neytra</div>
          <div class="brand-sub">SPATIAL AI</div>
        </div>
      </div>
      <div class="connection-status disconnected" id="connectionStatus">
        <div class="status-dot disconnected" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </div>

    <!-- Mode Bar -->
    <div class="modes-bar">
      <div class="mode-pill active scan-mode" id="pill-scan" onclick="switchMode('scan')"><div class="indicator"></div>Scan</div>
      <div class="mode-pill quick-mode" id="pill-quickscan" onclick="switchMode('quickscan')"><div class="indicator"></div>Quick</div>
      <div class="mode-pill face-mode" id="pill-face" onclick="switchMode('face')"><div class="indicator"></div>Face ID</div>
    </div>

    <!-- Video -->
    <div class="video-wrapper video-brackets">
      <div class="video-status-pill" id="vidStatus"><div class="dot"></div><span id="vidStatusTxt">IDLE</span></div>
      <video id="cam" autoplay playsinline muted></video>
    </div>

    <!-- Narration Card -->
    <div class="card narration-card">
      <div class="card-label">AI NARRATION</div>
      <div id="output-text">System ready. Select a mode or start scanning.</div>
    </div>

    <!-- Detected Faces Section -->
    <div class="faces-section" style="margin-bottom: 20px;">
      <div class="card-label">DETECTED FACES</div>
      <div class="faces-container" id="faces-container">
        <!-- populated dynamically -->
        <div style="font-size:14px; color:#64748b;">None detected</div>
      </div>
    </div>

    <!-- Enroll Alert -->
    <div id="enrollmentControls" class="enrollment-alert" style="display:none;">
      <div class="enroll-label">⚠ ENROLLMENT PENDING</div>
      <div class="enroll-text" id="enrollmentText">Save "Unknown" to memory?</div>
      <div class="enroll-actions">
        <button class="btn-warn" id="enrollConfirmBtn">Save</button>
        <button class="btn-muted" id="enrollRetryBtn">Retry Name</button>
        <button class="btn-muted" style="border:none;" id="enrollCancelBtn">Cancel</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn btn-primary" id="toggleBtn">Start Scanning</button>
      <button class="btn btn-secondary" id="analyzeBtn">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        Analyze
      </button>
    </div>

    <!-- Voice Command -->
    <div class="card voice-command-card" style="margin-bottom: 24px;">
      <div class="card-label" style="text-align: center;">VOICE COMMAND</div>
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <div style="font-family: monospace; color: var(--text-muted); font-size: 13px;" id="voiceFeedback">Press to speak a command</div>
    </div>

    <!-- Footer Stats -->
    <div class="footer-stats">
      <div class="stat-box highlight">
        <div class="stat-val" id="stat-vision-mode">SCAN</div>
        <div class="stat-lbl">MODE</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-frames">0</div>
        <div class="stat-lbl">FRAMES</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-faces">0</div>
        <div class="stat-lbl">FACES</div>
      </div>
    </div>

  </div>

  <script>
    // =============================================
    // CONFIGURATION
    // =============================================
    const backendURL = "http://10.67.168.33:8000";

    // =============================================
    // STATE MANAGEMENT
    // =============================================
    let streaming = false;
    let intervalId = null;
    let isListening = false;
    let recognition = null;
    let currentMode = 'scan'; // scan, quickscan, face, vision
    let isProcessing = false;

    // Enrollment state 
    let enrollmentState = {
      active: false,
      pendingFaceEncoding: null,
      pendingName: null,
      pendingEnrollmentPrompted: false,
      // remember streaming state so we can resume after enrollment
      wasStreaming: false
    };

    // Helper: common affirmative/negative phrases
    function isAffirmative(text) {
      if (!text) return false;
      const t = text.toLowerCase();
      return ["yes", "yeah", "yep", "yup", "sure", "ok", "okay", "confirm", "correct", "add"].some(w => t.includes(w));
    }

    function isNegative(text) {
      if (!text) return false;
      const t = text.toLowerCase();
      return ["no", "nah", "nope", "skip", "cancel", "don't", "dont"].some(w => t.includes(w));
    }

    // =============================================
    // DOM ELEMENTS
    // =============================================
    const video = document.getElementById("cam");
    const output = document.getElementById("output");
    const micBtn = document.getElementById("micBtn");
    const voiceFeedback = document.getElementById("voiceFeedback");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const currentModeDisplay = document.getElementById("currentMode");
    const modeDescription = document.getElementById("modeDescription");
    const toggleBtn = document.getElementById("toggleBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");

    // Announce cooldowns for known people
    const nameCooldowns = {};
    const NAME_COOLDOWN_SECONDS = 30;

    function shouldAnnounceName(name) {
      const now = Date.now() / 1000;
      const lastAnnounced = nameCooldowns[name] || 0;
      if (now - lastAnnounced >= NAME_COOLDOWN_SECONDS) {
        nameCooldowns[name] = now;
        return true;
      }
      return false;
    }

    // =============================================
    // MODE CONFIGURATION
    // =============================================
    const MODE_CONFIG = {
      scan: {
        endpoint: '/api/scan',
        interval: 3000, // 3 seconds
        name: 'SCAN MODE',
        description: 'Standard object detection every 3 seconds'
      },
      quickscan: {
        endpoint: '/api/quickscan',
        interval: 2000, // 2 seconds for urgent scenarios
        name: 'QUICK SCAN MODE',
        description: 'Fast detection for urgent scenarios'
      },
      face: {
        endpoint: '/api/face',
        interval: 3000, // 3 seconds for faster response
        name: 'FACE RECOGNITION MODE',
        description: 'Identifying people and objects using YOLO'
      },
      vision: {
        endpoint: '/api/vision',
        interval: null, // One-shot only
        name: 'VISION MODE',
        description: 'AI analysis of the scene'
      }
    };

    // =============================================
    // 1. CAMERA INITIALIZATION
    // =============================================
    async function startCamera() {
      try {
        const constraints = {
          video: { facingMode: { ideal: "user" } }, // Back camera, user: front
          audio: false,
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        updateStatus("Ready", false);
        console.log('[CAMERA] Started successfully');
      } catch (err) {
        output.innerHTML = `<strong>Camera Error:</strong> ${err}`;
        updateStatus("Error", false);
        console.error('[CAMERA ERROR]', err);
      }
    }

    // Initialize camera on load
    startCamera()
      .then(() => {
        switchMode('scan');
        startStreaming();
      })
      .catch(() => {
        // Camera failed to start; user can still manually start scanning after granting permission
      });

    // =============================================
    // 2. FRAME CAPTURE AND SEND
    // =============================================
    async function captureAndSendFrame(force = false) {
      if (!force && (!streaming || isProcessing)) {
        console.log('[FRAME] Skipping capture; streaming:', streaming, 'isProcessing:', isProcessing, 'force:', force);
        return;
      }

      isProcessing = true;

      try {
        const canvas = document.createElement("canvas");
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, "image/jpeg", 0.7)
        );

        const formData = new FormData();
        formData.append("file", blob, "frame.jpg");

        const endpoint = MODE_CONFIG[currentMode].endpoint;
        console.log(`[${currentMode.toUpperCase()}] Sending frame to ${endpoint}`);

        const res = await fetch(`${backendURL}${endpoint}`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        console.log(`[${currentMode.toUpperCase()}] Response:`, data);

        handleModeResponse(data);

      } catch (err) {
        output.innerHTML = `<strong>Connection Error:</strong> ${err}`;
        console.error('[FRAME ERROR]', err);
      } finally {
        isProcessing = false;
      }
    }

    function handleModeResponse(data) {
      switch (currentMode) {
        case 'scan':
        case 'quickscan':
          handleScanResponse(data);
          break;
        case 'face':
          handleFaceRecognition(data);
          break;
        case 'vision':
          handleVisionAnalysis(data);
          break;
      }
    }

    function handleScanResponse(data) {
      // Separate objects and faces
      const objects = data.detections.filter(d => d.type !== 'face');
      const faces = data.detections.filter(d => d.type === 'face');

      // Handle objects
      let text = `<strong>Detected (${data.mode}):</strong><br>`;
      const phrases = [];

      const FRAME_WIDTH = 640;
      const center = FRAME_WIDTH / 2;
      const margin = FRAME_WIDTH * 0.2;

      function getPosition(bbox) {
        if (!bbox || bbox.length < 4) return "ahead";
        const [x1, , x2] = bbox;
        const cx = (x1 + x2) / 2;
        if (cx < center - margin) return "on your left";
        if (cx > center + margin) return "on your right";
        return "ahead";
      }

      objects.forEach((det) => {
        const labelLower = det.label.toLowerCase();
        const pos = getPosition(det.bbox);
        const priority = det.priority ? '⚠ ' : '';
        const confidence = det.confidence ? `${(det.confidence * 100).toFixed(0)}%` : '';

        text += `${priority}📦 ${det.label} ${pos} ${confidence}<br>`;

        if (det.priority || currentMode === 'quickscan') {
          phrases.push(`${det.label} ${pos}`);
        }
      });

      // Handle faces
      if (faces && faces.length > 0) {
        faces.forEach((face) => {
          const icon = face.name === 'unknown' ? '❓' : '👤';
          text += `${icon} ${face.name}<br>`;

          if (face.announce && face.name !== 'unknown') {
            if (shouldAnnounceName(face.name)) {
              phrases.push(face.name);
            }
          }

          // Check if unknown face has encoding (eligible for enrollment)
          if (face.name === 'unknown' && face.face_encoding) {
            console.log('[FACE RECOGNITION] Found unknown face with encoding for enrollment');
            if (!enrollmentState.active) {
              enrollmentState.pendingFaceEncoding = face.face_encoding;
              enrollmentState.pendingEnrollmentPrompted = true;
              updateEnrollmentUI();

              if (face.prompt_enrollment) {
                const enrollText = 'Unknown person seen enough times. Starting enrollment now. Please say the person\'s name.';
                output.innerHTML = `<strong>Enrollment:</strong> ${enrollText}`;
                voiceFeedback.textContent = 'Enrollment started. Say the person\'s name.';
                updateStatus('Enrollment active', true);
                speak(enrollText);
                setTimeout(beginEnrollment, 300);
              } else {
                const promptText = `Unknown person detected ${face.detection_count} times. Keep them in frame for 3 detections within 15 seconds to enroll.`;
                output.innerHTML = `<strong>Enrollment pending:</strong> ${promptText}`;
                speak(promptText);
                voiceFeedback.textContent = promptText;
                updateStatus('Enrollment pending', false);
              }
            }
          } else if (face.name === 'unknown' && !face.face_encoding) {
            console.log('[ENROLLMENT] Unknown face found but no encoding - cannot enroll');
          }
        });
      }

      if (!objects.length && !faces.length) {
        text += "No objects or faces detected.";
      }

      // Navigation Guidance Override
      if (data.navigation) {
        text = `<strong>🧭 Navigation:</strong> ${data.navigation}<br><hr>` + text;
        output.innerHTML = text;
        speak(data.navigation);
      } else {
        output.innerHTML = text;
        if (phrases.length > 0) {
          speak(phrases.join(", ") + " detected");
        }
      }
    }

    function handleFaceRecognition(data) {
      let text = "<strong>Face Recognition:</strong><br>";
      const phrases = [];
      let unknownFaceFound = false;
      let unknownFaceWithEncoding = null;

      console.log('[FACE RECOGNITION] Processing response:', data);

      if (data.faces && data.faces.length > 0) {
        data.faces.forEach((face) => {
          const icon = face.name === 'unknown' ? '❓' : '👤';
          text += `${icon} ${face.name}<br>`;

          if (face.announce && face.name !== 'unknown') {
            if (shouldAnnounceName(face.name)) {
              phrases.push(face.name);
            }
          }

          // Check if unknown face has encoding (eligible for enrollment)
          if (face.name === 'unknown' && face.face_encoding) {
            unknownFaceFound = true;
            unknownFaceWithEncoding = face;
            console.log('[FACE RECOGNITION] Found unknown face with encoding for enrollment');
          }
        });
      }

      if (data.objects && data.objects.length > 0) {
        data.objects.forEach((obj) => {
          text += `📦 ${obj.label}<br>`;
        });
      }

      if (!data.faces?.length && !data.objects?.length) {
        text += "No faces or objects detected.";
      }

      output.innerHTML = text;

      if (phrases.length > 0) {
        speak(phrases.join(", ") + " detected");
      }

      // Handle unknown face enrollment prompt
      if (unknownFaceFound && unknownFaceWithEncoding && !enrollmentState.active) {
        console.log('[ENROLLMENT] Triggering enrollment prompt for unknown face');
        enrollmentState.pendingFaceEncoding = unknownFaceWithEncoding.face_encoding;
        enrollmentState.pendingEnrollmentPrompted = true;
        updateEnrollmentUI();

        if (unknownFaceWithEncoding.prompt_enrollment) {
          const enrollText = 'Unknown person seen enough times. Starting enrollment now. Please say the person’s name.';
          output.innerHTML = `<strong>Enrollment:</strong> ${enrollText}`;
          voiceFeedback.textContent = 'Enrollment started. Say the person’s name.';
          updateStatus('Enrollment active', true);
          speak(enrollText);
          setTimeout(beginEnrollment, 300);
        } else {
          const promptText = `Unknown person detected ${unknownFaceWithEncoding.detection_count} times. Keep them in frame for 3 detections within 15 seconds to enroll.`;
          output.innerHTML = `<strong>Enrollment pending:</strong> ${promptText}`;
          speak(promptText);
          voiceFeedback.textContent = promptText;
          updateStatus('Enrollment pending', false);
        }
      } else if (unknownFaceFound && !unknownFaceWithEncoding) {
        console.log('[ENROLLMENT] Unknown face found but no encoding - cannot enroll');
      }
    }

    function handleVisionAnalysis(data) {
      const visionText = data.description || data.text;
      if (visionText) {
        output.innerHTML = `<strong>Vision Analysis:</strong><br>${visionText}`;
        speak(visionText);
      } else {
        output.innerHTML = "<strong>Error:</strong> No analysis received.";
      }
    }

    // =============================================
    // 4. TEXT-TO-SPEECH
    // =============================================
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.0;
        msg.pitch = 1.0;
        msg.volume = 1.0;
        window.speechSynthesis.speak(msg);
      }
    }

    // =============================================
    // 5. MODE SWITCHING
    // =============================================
    function switchMode(newMode) {
      // Stop current streaming
      if (streaming) {
        stopStreaming();
      }

      // Update mode
      currentMode = newMode;
      const config = MODE_CONFIG[newMode];

      // Update UI
      currentModeDisplay.textContent = config.name;
      modeDescription.textContent = config.description;

      console.log(`[MODE] Switched to ${newMode}`);
    }

    function startStreaming() {
      if (streaming) return;

      const config = MODE_CONFIG[currentMode];

      if (!config.interval) {
        // One-shot mode (vision)
        captureAndSendFrame();
        return;
      }

      streaming = true;
      toggleBtn.textContent = `Stop ${config.name}`;
      toggleBtn.classList.add('active');
      updateStatus(`${config.name} Active, true`);

      // Immediate first frame
      captureAndSendFrame();

      // Then periodic updates
      intervalId = setInterval(captureAndSendFrame, config.interval);

      console.log(`[STREAMING] Started in ${currentMode} mode (${config.interval}ms interval)`);
    }

    function stopStreaming() {
      if (!streaming) return;

      streaming = false;
      clearInterval(intervalId);
      intervalId = null;

      toggleBtn.textContent = 'Start Scan Mode';
      toggleBtn.classList.remove('active');
      updateStatus("Paused", false);

      console.log('[STREAMING] Stopped');
    }

    // =============================================
    // 6. BUTTON HANDLERS
    // =============================================
    toggleBtn.onclick = () => {
      if (streaming) {
        stopStreaming();
      } else {
        startStreaming();
      }
    };

    analyzeBtn.onclick = async () => {
      const previousMode = currentMode;
      const wasStreamingBefore = streaming;

      if (streaming) {
        stopStreaming();
      }

      switchMode('vision');
      output.innerHTML = "<strong>Status:</strong> Analyzing scene...";
      speak("Analyzing scene");
      updateStatus("Analyzing", false);

      await captureAndSendFrame(true);

      switchMode(previousMode);
      if (wasStreamingBefore) {
        startStreaming();
      } else {
        updateStatus("Ready", false);
      }
    };

    // =============================================
    // 7. SPEECH RECOGNITION
    // =============================================
    function initSpeechRecognition() {
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          isListening = true;
          micBtn.classList.add('listening');
          voiceFeedback.innerHTML = '<span class="loading"></span> Listening...';
          console.log('[VOICE] Started listening');
        };

        recognition.onresult = (event) => {
          (async () => {
            const transcript = event.results[0][0].transcript;
            console.log(`[VOICE] Recognized: "${transcript}"`);
            voiceFeedback.textContent = `You said: "${transcript}"`;

            // Quick path: if we're in enrollment confirmation and user said affirmative, trigger save immediately
            try {
              if (enrollmentState.active && enrollmentState.pendingName && isAffirmative(transcript)) {
                console.log('[VOICE] Quick affirmative detected in onresult — completing enrollment');
                // Ensure streaming is stopped before saving
                if (streaming) {
                  console.log('[VOICE] Stopping streaming before enrollment save (quick path)');
                  stopStreaming();
                  enrollmentState.wasStreaming = true;
                }
                // call without awaiting to avoid blocking recognition lifecycle
                completeEnrollment();
                return;
              }
            } catch (e) {
              console.warn('[VOICE] Quick path check failed', e);
            }

            // Send to backend for intent detection / or enrollment flow
            await processVoiceCommand(transcript);

            // Auto-clear feedback after 3 seconds
            setTimeout(() => {
              if (voiceFeedback) voiceFeedback.textContent = '';
            }, 3000);
          })();
        };

        recognition.onerror = (event) => {
          console.error('[VOICE] Error:', event.error);

          let errorMsg = 'Could not recognize speech';
          if (event.error === 'no-speech') {
            errorMsg = 'No speech detected';
          } else if (event.error === 'network') {
            errorMsg = 'Network error';
          } else if (event.error === 'aborted') {
            errorMsg = 'Recognition aborted';
          }

          voiceFeedback.textContent = `Error: ${errorMsg}`;
          setTimeout(() => {
            if (voiceFeedback) voiceFeedback.textContent = '';
          }, 3000);
        };

        recognition.onend = () => {
          isListening = false;
          micBtn.classList.remove('listening');
          console.log('[VOICE] Stopped listening');
        };

        console.log('[VOICE] Speech recognition initialized');
        return true;
      } else {
        console.warn('[VOICE] Speech recognition not supported');
        if (voiceFeedback) {
          voiceFeedback.textContent = 'Voice input not supported on this browser';
        }
        return false;
      }
    }

    // Initialize speech recognition on load
    initSpeechRecognition();

    // =============================================
    // 8. MICROPHONE BUTTON HANDLER
    // =============================================
    if (micBtn) {
      micBtn.addEventListener('click', () => {
        if (!recognition) {
          voiceFeedback.textContent = 'Voice input not available';
          setTimeout(() => {
            voiceFeedback.textContent = '';
          }, 2000);
          return;
        }

        if (isListening) {
          recognition.stop();
          console.log('[VOICE] Manually stopped');
        } else {
          try {
            recognition.start();
          } catch (error) {
            console.error('[VOICE] Start error:', error);
            // Already running, stop and restart
            recognition.stop();
            setTimeout(() => {
              try {
                recognition.start();
              } catch (e) {
                console.error('[VOICE] Restart failed:', e);
              }
            }, 300);
          }
        }
      });
    }

    // =============================================
    // 9. PROCESS VOICE COMMAND
    // =============================================
    async function processVoiceCommand(command) {
      try {
        console.log('[VOICE] Processing command:', command);
        console.log('[VOICE] enrollmentState:', JSON.stringify({ active: enrollmentState.active, pendingFaceEncoding: !!enrollmentState.pendingFaceEncoding, pendingName: enrollmentState.pendingName, prompted: enrollmentState.pendingEnrollmentPrompted }));

        // Show processing state
        voiceFeedback.innerHTML = '<span class="loading"></span> Processing...';

        // ===== ENROLLMENT FLOW =====
        // If there's a pending unknown face and we have not yet asked to add
        if (enrollmentState.pendingFaceEncoding && !enrollmentState.active && !enrollmentState.pendingName) {
          if (isAffirmative(command)) {
            // User agreed to enroll — pause streaming so we don't get repeated detections
            enrollmentState.wasStreaming = streaming;
            if (streaming) stopStreaming();

            enrollmentState.active = true;
            enrollmentState.pendingEnrollmentPrompted = false;
            speak("Okay, please say the person's name");
            voiceFeedback.textContent = 'Ready for name input...';
            updateEnrollmentUI();
            return;
          } else if (isNegative(command)) {
            speak("Enrollment cancelled");
            enrollmentState.pendingFaceEncoding = null;
            enrollmentState.pendingEnrollmentPrompted = false;
            enrollmentState.active = false;
            voiceFeedback.textContent = '';
            updateEnrollmentUI();
            return;
          }
        }

        // If we're waiting for name input during enrollment (user already said yes)
        if (enrollmentState.active && enrollmentState.pendingFaceEncoding && !enrollmentState.pendingName) {
          // Treat the spoken command as the name
          enrollmentState.pendingName = command.trim();
          updateEnrollmentUI();
          speak(`You said ${enrollmentState.pendingName}. Is this correct? Say yes to confirm or no to try again.`);
          console.log('[ENROLLMENT] Captured name:', enrollmentState.pendingName);
          return;
        }

        // If we're confirming the name
        if (enrollmentState.active && enrollmentState.pendingFaceEncoding && enrollmentState.pendingName) {
          if (isAffirmative(command)) {
            // Ensure streaming is stopped before saving
            if (streaming) {
              console.log('[VOICE] Stopping streaming before enrollment save (confirmation branch)');
              stopStreaming();
              enrollmentState.wasStreaming = true;
            }
            // Complete enrollment
            await completeEnrollment();
            return;
          } else if (isNegative(command)) {
            // Let user try again without resuming streaming (they are in the enrollment flow)
            speak("Okay, let's try again. Say the person's name.");
            enrollmentState.pendingName = null;
            voiceFeedback.textContent = 'Ready for name input...';
            return;
          }
        }

        // If user explicitly cancels the enrollment flow while active
        if (enrollmentState.active && isNegative(command) && /cancel|stop|abort/.test(command.toLowerCase())) {
          const shouldResumeCancel = enrollmentState.wasStreaming;
          enrollmentState.pendingFaceEncoding = null;
          enrollmentState.pendingName = null;
          enrollmentState.active = false;
          enrollmentState.wasStreaming = false;
          speak('Enrollment cancelled');
          voiceFeedback.textContent = '';
          if (shouldResumeCancel) {
            setTimeout(() => startStreaming(), 300);
          }
          return;
        }

        // ===== END ENROLLMENT FLOW =====

        // Send command to backend for intent detection
        const response = await fetch(`${backendURL}/voice-command`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ command: command })
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const modeData = await response.json();
        console.log('[VOICE] Backend response:', modeData);

        // Step 2: Handle the detected mode
        await handleVoiceMode(modeData, command);

        // Clear feedback
        voiceFeedback.textContent = '';

      } catch (err) {
        console.error('[VOICE] Processing error:', err);
        voiceFeedback.textContent = 'Failed to process command';
        speak('Sorry, I could not process that command');

        setTimeout(() => {
          voiceFeedback.textContent = '';
        }, 2000);
      }
    }

    // =============================================
    // ENROLLMENT COMPLETION HANDLER
    // =============================================
    async function completeEnrollment() {
      try {
        const name = enrollmentState.pendingName;
        const encoding = enrollmentState.pendingFaceEncoding;

        console.log('[ENROLLMENT] Completing enrollment for:', name, 'encoding present?', !!encoding);
        updateEnrollmentUI();

        speak(`Adding ${name} to memory. Please wait...`);
        voiceFeedback.innerHTML = '<span class="loading"></span> Saving face...';

        // Call backend to save the face
        const response = await fetch(`${backendURL}/api/enroll/save`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: name,
            face_encoding: encoding
          })
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const result = await response.json();

        if (result.status === 'success') {
          speak(`${name} has been added to memory successfully`);
          console.log('[ENROLLMENT] Success:', result);
        } else {
          speak(`Failed to save ${name}. Error: ${result.message}`);
          console.error('[ENROLLMENT] Failed:', result);
        }

        // Reset enrollment state and resume streaming if we paused it
        const shouldResume = enrollmentState.wasStreaming;
        enrollmentState.pendingFaceEncoding = null;
        enrollmentState.pendingName = null;
        enrollmentState.active = false;
        enrollmentState.wasStreaming = false;
        voiceFeedback.textContent = '';
        updateStatus('Ready', false);

        if (shouldResume) {
          // small delay to let TTS finish speaking the success message
          setTimeout(() => {
            startStreaming();
          }, 500);
        }

      } catch (err) {
        console.error('[ENROLLMENT] Error:', err);
        speak('Failed to save the face. Please try again.');
        voiceFeedback.textContent = 'Enrollment failed';

        // Reset on error and resume streaming if needed
        const shouldResumeOnError = enrollmentState.wasStreaming;
        enrollmentState.pendingFaceEncoding = null;
        enrollmentState.pendingName = null;
        enrollmentState.active = false;
        enrollmentState.wasStreaming = false;
        updateStatus('Ready', false);

        if (shouldResumeOnError) {
          setTimeout(() => {
            startStreaming();
          }, 500);
        }

        setTimeout(() => {
          voiceFeedback.textContent = '';
        }, 2000);
      }
    }

    // =============================================
    // 10. HANDLE VOICE-DETECTED MODE
    // =============================================

    // =============================================
    // ENROLLMENT UI HELPERS
    // =============================================
    const enrollmentControls = document.getElementById('enrollmentControls');
    const enrollmentText = document.getElementById('enrollmentText');
    const enrollConfirmBtn = document.getElementById('enrollConfirmBtn');
    const enrollRetryBtn = document.getElementById('enrollRetryBtn');
    const enrollCancelBtn = document.getElementById('enrollCancelBtn');

    function updateEnrollmentUI() {
      try {
        if (enrollmentState.active && enrollmentState.pendingName) {
          enrollmentControls.style.display = 'block';
          enrollConfirmBtn.textContent = 'Save Name';
          enrollmentText.textContent = `Add "${enrollmentState.pendingName}" to memory?`;
        } else if (enrollmentState.active && enrollmentState.pendingFaceEncoding && !enrollmentState.pendingName) {
          enrollmentControls.style.display = 'block';
          enrollConfirmBtn.textContent = 'Capture Name';
          enrollmentText.textContent = 'Waiting for name... Press the microphone and speak the person’s name.';
        } else if (enrollmentState.pendingFaceEncoding && !enrollmentState.active) {
          enrollmentControls.style.display = 'block';
          enrollConfirmBtn.textContent = 'Start Enrollment';
          enrollmentText.textContent = 'Unknown person detected. Say yes or press Start Enrollment to enroll.';
        } else {
          enrollmentControls.style.display = 'none';
          enrollmentText.textContent = '';
        }
      } catch (e) {
        console.warn('Failed to update enrollment UI', e);
      }
    }

    function beginEnrollment() {
      if (!enrollmentState.pendingFaceEncoding) {
        speak('No unknown face is waiting to be enrolled.');
        return;
      }
      enrollmentState.wasStreaming = streaming;
      if (streaming) stopStreaming();
      enrollmentState.active = true;
      enrollmentState.pendingEnrollmentPrompted = false;
      enrollmentState.pendingName = null;
      updateEnrollmentUI();
      updateStatus('Enrollment active', true);
      voiceFeedback.textContent = 'Ready for name input...';
    }

    enrollConfirmBtn.addEventListener('click', () => {
      console.log('[ENROLLMENT UI] Confirm button clicked');
      if (!enrollmentState.active && enrollmentState.pendingFaceEncoding) {
        beginEnrollment();
      } else if (enrollmentState.active && enrollmentState.pendingName) {
        completeEnrollment();
      } else {
        speak('Press the microphone and say the name when ready.');
      }
    });

    enrollRetryBtn.addEventListener('click', () => {
      console.log('[ENROLLMENT UI] Retry name clicked');
      if (enrollmentState.active) {
        enrollmentState.pendingName = null;
        speak("Okay, please say the person's name");
        voiceFeedback.textContent = 'Ready for name input...';
      } else {
        speak('Enrollment has not started yet. Press Start Enrollment first.');
      }
      updateEnrollmentUI();
    });

    enrollCancelBtn.addEventListener('click', () => {
      console.log('[ENROLLMENT UI] Cancel clicked');
      const shouldResume = enrollmentState.wasStreaming;
      enrollmentState.pendingFaceEncoding = null;
      enrollmentState.pendingName = null;
      enrollmentState.active = false;
      enrollmentState.wasStreaming = false;
      updateEnrollmentUI();
      updateStatus('Ready', false);
      speak('Enrollment cancelled');
      if (shouldResume) setTimeout(() => startStreaming(), 300);
    });
    async function handleVoiceMode(modeData, originalCommand) {
      const { mode, prompt, endpoint } = modeData;

      console.log(`[VOICE] Switching to mode: ${mode}`);

      // Stop current streaming
      if (streaming) {
        stopStreaming();
      }

      switch (mode) {
        case 'scan':
          switchMode('scan');
          startStreaming();
          speak('Scan mode activated');
          break;

        case 'quickscan':
          switchMode('quickscan');
          startStreaming();
          speak('Quick scan mode activated. Watching for obstacles.');
          break;

        case 'face':
          switchMode('face');
          startStreaming();
          speak('Face recognition mode activated');
          break;

        case 'vision':
          // For vision mode, capture frame and send with prompt
          switchMode('vision');
          output.innerHTML = `<strong>Question:</strong> ${originalCommand}<br><strong>Status:</strong> Analyzing...`;
          speak('Let me analyze that');

          try {
            const canvas = document.createElement("canvas");
            canvas.width = 640;
            canvas.height = 480;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const blob = await new Promise((resolve) =>
              canvas.toBlob(resolve, "image/jpeg", 0.8)
            );

            const formData = new FormData();
            formData.append("file", blob, "frame.jpg");

            // Add the prompt from LLM
            if (prompt) {
              formData.append("prompt", prompt);
            }

            const response = await fetch(`${backendURL}${endpoint}`, {
              method: 'POST',
              body: formData
            });

            const result = await response.json();

            output.innerHTML = `<strong>Question:</strong> ${originalCommand}<br><strong>Answer:</strong> ${result.text}`;
            speak(result.text);

          } catch (err) {
            console.error('[VISION ERROR]', err);
            output.innerHTML = `<strong>Error:</strong> Failed to analyze scene`;
            speak('Sorry, I could not analyze the scene');
          }
          break;
        case 'interaction':
          switchMode('scan');
          output.innerHTML = `<strong>Interaction:</strong> ${prompt || originalCommand}`;
          speak(prompt || 'Okay');
          break;
        default:
          switchMode('scan');
          output.innerHTML = `<strong>Unknown mode:</strong> ${mode}. Returning to scan.`;
          speak('Switching back to scan mode');
      }
    }

    // =============================================
    // 11. STATUS INDICATOR UPDATE
    // =============================================
    function updateStatus(text, active) {
      if (statusText) statusText.textContent = text;
      if (statusDot) {
        if (active) {
          statusDot.classList.add('active');
        } else {
          statusDot.classList.remove('active');
        }
      }
    }

    // =============================================
    // 12. KEYBOARD SHORTCUTS (Optional)
    // =============================================
    document.addEventListener('keydown', (e) => {
      // Press 'V' to trigger voice input
      if (e.key === 'v' || e.key === 'V') {
        if (micBtn && !isListening) {
          micBtn.click();
        }
      }

      // Press 'S' to toggle streaming
      if (e.key === 's' || e.key === 'S') {
        toggleBtn.click();
      }

      // Press 'A' to analyze scene
      if (e.key === 'a' || e.key === 'A') {
        analyzeBtn.click();
      }

      // Press '1' for scan mode
      if (e.key === '1') {
        switchMode('scan');
        speak('Scan mode');
      }

      // Press '2' for quickscan mode
      if (e.key === '2') {
        switchMode('quickscan');
        speak('Quick scan mode');
      }

      // Press '3' for face recognition mode
      if (e.key === '3') {
        switchMode('face');
        speak('Face recognition mode');
      }
    });

    // =============================================
    // 13. WAKE LOCK (Prevent Screen Sleep)
    // =============================================
    let wakeLock = null;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('[WAKELOCK] Screen wake lock activated');

          wakeLock.addEventListener('release', () => {
            console.log('[WAKELOCK] Screen wake lock released');
          });
        } catch (err) {
          console.error('[WAKELOCK] Error:', err);
        }
      }
    }

    // Request wake lock when streaming starts
    const originalStartStreaming = startStreaming;
    startStreaming = function () {
      originalStartStreaming();
      if (streaming) {
        requestWakeLock();
      }
    };

    const originalStopStreaming = stopStreaming;
    stopStreaming = function () {
      originalStopStreaming();
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
    };

    // =============================================
    // 14. PAGE VISIBILITY (Pause when hidden)
    // =============================================
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        console.log('[PAGE] Hidden, pausing...');
        if (streaming) {
          stopStreaming();
        }
      } else {
        console.log('[PAGE] Visible again');
      }
    });

    // =============================================
    // 15. CONNECTION CHECK
    // =============================================
    async function checkServerConnection() {
      try {
        const response = await fetch(`${backendURL}/health`);
        const health = await response.json();

        console.log('[SERVER] Health check:', health);

        if (!health.yolo_model_loaded) {
          output.innerHTML = '<strong>⚠ Warning:</strong> YOLO model not loaded. Object detection may not work.';
        }

        if (!health.groq_configured) {
          console.warn('[SERVER] Groq API not configured');
        }

        updateStatus("Connected", false);
        return true;

      } catch (err) {
        console.error('[SERVER] Connection failed:', err);
        updateStatus("Server Offline", false);
        output.innerHTML = '<strong>Error:</strong> Cannot connect to server. Please check if the backend is running.';
        return false;
      }
    }

    // Check connection on load
    setTimeout(checkServerConnection, 1000);

    // =============================================
    // 16. PERIODIC CONNECTION CHECK
    // =============================================
    setInterval(() => {
      if (!streaming) {
        checkServerConnection();
      }
    }, 30000); // Check every 30 seconds when not streaming

    // =============================================
    // 17. ERROR RECOVERY
    // =============================================
    window.addEventListener('error', (event) => {
      console.error('[GLOBAL ERROR]', event.error);
    });
