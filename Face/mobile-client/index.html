<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neytra — Spatial AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040608;
      --bg-2: #080c12;
      --bg-card: rgba(255,255,255,0.028);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --cyan: #00d4ff;
      --cyan-dim: rgba(0,212,255,0.12);
      --cyan-glow: rgba(0,212,255,0.25);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --red: #ff3b3b;
      --green: #00e5a0;
      --green-dim: rgba(0,229,160,0.12);
      --text: #edf2f7;
      --text-2: #8899aa;
      --text-3: #4a5568;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow-x: hidden;
    }

    /* Ambient background effect */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      left: 20%;
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(0,229,160,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 48px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-top: 4px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--cyan-glow);
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 20px;
      height: 20px;
      fill: #000;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--cyan);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* Connection badge */
    .conn-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      border-radius: 30px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-2);
      letter-spacing: 0.04em;
      transition: all 0.3s;
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .conn-badge.online .conn-dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-dot 2s infinite;
    }

    .conn-badge.online { color: var(--text); border-color: rgba(0,229,160,0.2); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── MODE STRIP ── */
    .mode-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .mode-strip::-webkit-scrollbar { display: none; }

    .mode-chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .mode-chip:hover { border-color: var(--border-bright); color: var(--text); }

    .mode-chip.active {
      background: var(--cyan-dim);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 12px var(--cyan-glow);
    }

    /* ── CAMERA BLOCK ── */
    .camera-block {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-2);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      aspect-ratio: 4/3;
    }

    #cam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan line animation */
    .scanline {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .camera-block.streaming .scanline {
      opacity: 1;
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0; }
      5% { opacity: 0.8; }
      95% { opacity: 0.8; }
      100% { top: 100%; opacity: 0; }
    }

    /* Corner brackets */
    .cam-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 4;
      pointer-events: none;
    }
    .cam-corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .cam-corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
    .cam-corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .cam-corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

    /* Live badge */
    .cam-live {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 20px;
      background: rgba(4,6,8,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      z-index: 5;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-2);
      letter-spacing: 0.08em;
      transition: all 0.3s;
    }

    .cam-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      transition: all 0.3s;
    }

    .cam-live.active .cam-live-dot {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: blink 1s infinite;
    }

    .cam-live.active { border-color: rgba(255,59,59,0.3); color: var(--text); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Hazard overlay */
    .hazard-banner {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(0deg, rgba(255,59,59,0.9) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 6;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .hazard-banner.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hazard-banner span {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hazard-icon {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── NARRATION CARD ── */
    .narration-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      min-height: 100px;
      position: relative;
      overflow: hidden;
    }

    .narration-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--cyan), var(--green));
      border-radius: 0 2px 2px 0;
    }

    .narration-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--cyan);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .narration-text {
      font-size: 1.0rem;
      line-height: 1.6;
      color: var(--text);
      font-weight: 400;
      min-height: 48px;
    }

    .narration-text.empty { color: var(--text-3); font-style: italic; }

    /* Processing dots */
    .processing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      vertical-align: middle;
    }

    .processing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      animation: dot-bounce 1.2s infinite;
    }

    .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .processing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── CONTROLS ROW ── */
    .controls-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    .btn-primary {
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--cyan);
      color: #000;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px var(--cyan-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px var(--cyan-glow); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-primary.stop {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(255,59,59,0.3);
      box-shadow: none;
    }

    .btn-primary.stop:hover { background: rgba(255,59,59,0.08); box-shadow: none; }

    .btn-secondary {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-2);
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .btn-secondary:hover { border-color: var(--border-bright); color: var(--text); }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── VOICE SECTION ── */
    .voice-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .voice-section::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
    }

    .voice-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-3);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Mic button */
    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--border-bright);
      background: var(--bg-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      position: relative;
      z-index: 2;
    }

    .mic-btn svg { width: 32px; height: 32px; fill: var(--text-2); transition: all 0.25s; }

    .mic-btn:hover {
      border-color: var(--cyan);
      background: var(--cyan-dim);
      box-shadow: 0 0 24px var(--cyan-glow);
    }

    .mic-btn:hover svg { fill: var(--cyan); }

    .mic-btn:active { transform: scale(0.93); }

    .mic-btn.listening {
      border-color: var(--red);
      background: rgba(255,59,59,0.08);
      box-shadow: 0 0 30px rgba(255,59,59,0.3);
      animation: mic-pulse 1.2s infinite;
    }

    .mic-btn.listening svg { fill: var(--red); }

    /* Ripple rings when listening */
    .mic-rings {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      pointer-events: none;
    }

    .mic-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--red);
      opacity: 0;
    }

    .mic-btn.listening ~ .mic-rings .mic-ring:nth-child(1) { animation: ring-out 1.5s 0s infinite; }
    .mic-btn.listening ~ .mic-rings .mic-ring:nth-child(2) { animation: ring-out 1.5s 0.4s infinite; }
    .mic-btn.listening ~ .mic-rings .mic-ring:nth-child(3) { animation: ring-out 1.5s 0.8s infinite; }

    @keyframes ring-out {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,59,59,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,59,59,0.5); }
    }

    .voice-feedback {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-2);
      text-align: center;
      min-height: 20px;
      letter-spacing: 0.02em;
      max-width: 90%;
    }

    .voice-feedback.heard { color: var(--cyan); }

    /* ── ENROLLMENT CARD ── */
    .enrollment-card {
      background: var(--amber-dim);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      display: none;
    }

    .enrollment-card.visible { display: block; animation: slide-in 0.3s ease; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .enrollment-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--amber);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #enrollmentText {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .enrollment-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .enroll-btn {
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-2);
      font-family: var(--display);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .enroll-btn:hover { border-color: var(--border-bright); color: var(--text); }
    .enroll-btn:active { transform: scale(0.96); }

    #enrollConfirmBtn {
      background: var(--amber);
      border-color: var(--amber);
      color: #000;
      font-weight: 700;
    }

    #enrollConfirmBtn:hover { background: #fbbf24; box-shadow: 0 4px 14px rgba(245,158,11,0.3); }

    /* ── FACES STRIP ── */
    .faces-strip {
      margin-bottom: 12px;
      display: none;
    }

    .faces-strip.visible { display: block; }

    .faces-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .faces-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .face-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      animation: pop-in 0.2s ease;
    }

    .face-chip.known { border-color: rgba(0,229,160,0.3); background: var(--green-dim); }
    .face-chip.unknown { border-color: rgba(245,158,11,0.3); background: var(--amber-dim); }

    .face-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .face-chip.known .face-dot { background: var(--green); }
    .face-chip.unknown .face-dot { background: var(--amber); }

    @keyframes pop-in {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ── FOOTER STATS ── */
    .footer-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-cell {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      display: block;
    }

    .stat-key {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
      display: block;
    }

    /* Keyboard shortcut hint */
    .kbd-hint {
      text-align: center;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    .kbd {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      margin: 0 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>

<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">
        <!-- Eye/glasses icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Neytra</div>
        <div class="logo-sub">Spatial AI</div>
      </div>
    </div>
    <div class="conn-badge" id="connBadge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connText">Offline</span>
    </div>
  </header>

  <!-- Mode chips -->
  <div class="mode-strip">
    <div class="mode-chip active" data-mode="scan" onclick="handleModeChip('scan')">⬤ Scan</div>
    <div class="mode-chip" data-mode="quickscan" onclick="handleModeChip('quickscan')">⚡ Quick</div>
    <div class="mode-chip" data-mode="face" onclick="handleModeChip('face')">◉ Face ID</div>
    <div class="mode-chip" data-mode="vision" onclick="handleModeChip('vision')">✦ Vision</div>
  </div>

  <!-- Camera -->
  <div class="camera-block" id="cameraBlock">
    <video id="cam" autoplay playsinline muted></video>
    <div class="scanline"></div>
    <div class="cam-corner tl"></div>
    <div class="cam-corner tr"></div>
    <div class="cam-corner bl"></div>
    <div class="cam-corner br"></div>
    <div class="cam-live" id="camLive">
      <div class="cam-live-dot"></div>
      <span id="camLiveText">IDLE</span>
    </div>
    <div class="hazard-banner" id="hazardBanner">
      <svg class="hazard-icon" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      <span id="hazardText">Hazard ahead</span>
    </div>
  </div>

  <!-- Narration card -->
  <div class="narration-card">
    <div class="narration-label">AI Narration</div>
    <div class="narration-text empty" id="output">Waiting for camera feed...</div>
  </div>

  <!-- Faces strip -->
  <div class="faces-strip" id="facesStrip">
    <div class="faces-label">Detected faces</div>
    <div class="faces-list" id="facesList"></div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <button class="btn-primary" id="toggleBtn" onclick="handleToggle()">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      Start Scanning
    </button>
    <button class="btn-secondary" id="analyzeBtn" onclick="handleAnalyze()">
      <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5z"/></svg>
      Analyze
    </button>
  </div>

  <!-- Voice -->
  <div class="voice-section">
    <div class="voice-label">Voice Command</div>
    <div style="position:relative; display:flex; align-items:center; justify-content:center;">
      <button class="mic-btn" id="micBtn" aria-label="Voice Input">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <div class="mic-rings">
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
      </div>
    </div>
    <div class="voice-feedback" id="voiceFeedback">Press to speak a command</div>
  </div>

  <!-- Enrollment -->
  <div class="enrollment-card" id="enrollmentControls">
    <div class="enrollment-label">⚠ Enrollment Pending</div>
    <div id="enrollmentText">Unknown person detected.</div>
    <div class="enrollment-btns">
      <button class="enroll-btn" id="enrollConfirmBtn">Confirm</button>
      <button class="enroll-btn" id="enrollRetryBtn">Retry Name</button>
      <button class="enroll-btn" id="enrollCancelBtn">Cancel</button>
    </div>
  </div>

  <!-- Footer stats -->
  <div class="footer-stats">
    <div class="stat-cell">
      <span class="stat-val" id="statMode">SCAN</span>
      <span class="stat-key">Mode</span>
    </div>
    <div class="stat-cell">
      <span class="stat-val" id="statFrames">0</span>
      <span class="stat-key">Frames</span>
    </div>
    <div class="stat-cell">
      <span class="stat-val" id="statFaces">0</span>
      <span class="stat-key">Faces</span>
    </div>
  </div>

  <div class="kbd-hint">
    <span class="kbd">V</span> voice &nbsp;
    <span class="kbd">S</span> scan &nbsp;
    <span class="kbd">A</span> analyze &nbsp;
    <span class="kbd">1</span><span class="kbd">2</span><span class="kbd">3</span> modes
  </div>

</div>

<script>
  // =============================================
  // CONFIGURATION
  // =============================================
  const backendURL = "http://10.67.168.33:8000";

  // =============================================
  // STATE
  // =============================================
  let streaming = false;
  let intervalId = null;
  let isListening = false;
  let recognition = null;
  let currentMode = 'scan';
  let isProcessing = false;
  let frameCount = 0;
  let faceCount = 0;

  let enrollmentState = {
    active: false,
    pendingFaceEncoding: null,
    pendingName: null,
    pendingEnrollmentPrompted: false,
    wasStreaming: false
  };

  function isAffirmative(text) {
    if (!text) return false;
    const t = text.toLowerCase();
    return ["yes", "yeah", "yep", "yup", "sure", "ok", "okay", "confirm", "correct", "add"].some(w => t.includes(w));
  }

  function isNegative(text) {
    if (!text) return false;
    const t = text.toLowerCase();
    return ["no", "nah", "nope", "skip", "cancel", "don't", "dont"].some(w => t.includes(w));
  }

  // =============================================
  // DOM
  // =============================================
  const video = document.getElementById("cam");
  const output = document.getElementById("output");
  const micBtn = document.getElementById("micBtn");
  const voiceFeedback = document.getElementById("voiceFeedback");
  const toggleBtn = document.getElementById("toggleBtn");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const cameraBlock = document.getElementById("cameraBlock");
  const camLive = document.getElementById("camLive");
  const camLiveText = document.getElementById("camLiveText");
  const hazardBanner = document.getElementById("hazardBanner");
  const hazardText = document.getElementById("hazardText");
  const facesStrip = document.getElementById("facesStrip");
  const facesList = document.getElementById("facesList");
  const connBadge = document.getElementById("connBadge");
  const connText = document.getElementById("connText");
  const statMode = document.getElementById("statMode");
  const statFrames = document.getElementById("statFrames");
  const statFaces = document.getElementById("statFaces");

  const nameCooldowns = {};
  const NAME_COOLDOWN_SECONDS = 30;

  function shouldAnnounceName(name) {
    const now = Date.now() / 1000;
    const lastAnnounced = nameCooldowns[name] || 0;
    if (now - lastAnnounced >= NAME_COOLDOWN_SECONDS) {
      nameCooldowns[name] = now;
      return true;
    }
    return false;
  }

  // =============================================
  // MODE CONFIG
  // =============================================
  const MODE_CONFIG = {
    scan:      { endpoint: '/api/scan',      interval: 3000,  name: 'SCAN',  description: 'Standard object detection' },
    quickscan: { endpoint: '/api/quickscan', interval: 2000,  name: 'QUICK', description: 'Fast urgent detection' },
    face:      { endpoint: '/api/face',      interval: 3000,  name: 'FACE',  description: 'Face recognition active' },
    vision:    { endpoint: '/api/vision',    interval: null,  name: 'VISION', description: 'AI scene analysis' }
  };

  // =============================================
  // UI HELPERS
  // =============================================
  function setNarration(html, isEmpty = false) {
    output.innerHTML = html;
    output.className = 'narration-text' + (isEmpty ? ' empty' : '');
  }

  function setProcessing() {
    output.innerHTML = '<span class="processing-dots"><span></span><span></span><span></span></span>';
    output.className = 'narration-text';
  }

  function updateStatus(text, active) {
    camLiveText.textContent = text.toUpperCase();
    if (active) {
      camLive.classList.add('active');
      cameraBlock.classList.add('streaming');
    } else {
      camLive.classList.remove('active');
      cameraBlock.classList.remove('streaming');
    }
  }

  function showHazard(text) {
    hazardText.textContent = text || 'Hazard ahead';
    hazardBanner.classList.add('visible');
    setTimeout(() => hazardBanner.classList.remove('visible'), 4000);
  }

  function updateModeChips(mode) {
    document.querySelectorAll('.mode-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.mode === mode);
    });
    statMode.textContent = MODE_CONFIG[mode]?.name || mode.toUpperCase();
  }

  function updateFacesUI(faces) {
    facesList.innerHTML = '';
    if (!faces || faces.length === 0) {
      facesStrip.classList.remove('visible');
      return;
    }
    facesStrip.classList.add('visible');
    faces.forEach(f => {
      const chip = document.createElement('div');
      const known = f.name && f.name !== 'unknown';
      chip.className = 'face-chip ' + (known ? 'known' : 'unknown');
      chip.innerHTML = `<div class="face-dot"></div>${known ? f.name : 'Unknown'}`;
      facesList.appendChild(chip);
    });
    faceCount = faces.length;
    statFaces.textContent = faceCount;
  }

  function setOnline(online) {
    connBadge.className = 'conn-badge' + (online ? ' online' : '');
    connText.textContent = online ? 'Connected' : 'Offline';
  }

  // =============================================
  // CAMERA
  // =============================================
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "user" } },
        audio: false,
      });
      video.srcObject = stream;
      updateStatus("Ready", false);
    } catch (err) {
      setNarration(`<strong>Camera error:</strong> ${err.message}`, false);
      updateStatus("Error", false);
    }
  }

  startCamera().then(() => { switchMode('scan'); startStreaming(); });

  // =============================================
  // FRAME CAPTURE
  // =============================================
  async function captureAndSendFrame(force = false) {
    if (!force && (!streaming || isProcessing)) return;
    isProcessing = true;

    try {
      const canvas = document.createElement("canvas");
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.7));
      const formData = new FormData();
      formData.append("file", blob, "frame.jpg");

      const endpoint = MODE_CONFIG[currentMode].endpoint;
      const res = await fetch(`${backendURL}${endpoint}`, { method: "POST", body: formData });
      const data = await res.json();

      frameCount++;
      statFrames.textContent = frameCount;

      handleModeResponse(data);
    } catch (err) {
      setNarration(`Connection error — check backend`, false);
    } finally {
      isProcessing = false;
    }
  }

  function handleModeResponse(data) {
    switch (currentMode) {
      case 'scan': case 'quickscan': handleScanResponse(data); break;
      case 'face': handleFaceRecognition(data); break;
      case 'vision': handleVisionAnalysis(data); break;
    }
  }

  function handleScanResponse(data) {
    const objects = data.detections.filter(d => d.type !== 'face');
    const faces = data.detections.filter(d => d.type === 'face');

    const FRAME_WIDTH = 640;
    const center = FRAME_WIDTH / 2;
    const margin = FRAME_WIDTH * 0.2;

    function getPosition(bbox) {
      if (!bbox || bbox.length < 4) return "ahead";
      const cx = (bbox[0] + bbox[2]) / 2;
      if (cx < center - margin) return "left";
      if (cx > center + margin) return "right";
      return "ahead";
    }

    let lines = [];
    const phrases = [];

    objects.forEach(det => {
      const pos = getPosition(det.bbox);
      const priority = det.priority ? '⚠ ' : '';
      lines.push(`${priority}${det.label} <span style="color:var(--text-2)">${pos}</span>`);
      if (det.priority || currentMode === 'quickscan') phrases.push(`${det.label} ${pos}`);
    });

    faces.forEach(face => {
      const icon = face.name === 'unknown' ? '◎' : '◉';
      lines.push(`${icon} ${face.name}`);
      if (face.announce && face.name !== 'unknown' && shouldAnnounceName(face.name)) {
        phrases.push(face.name);
      }
      if (face.name === 'unknown' && face.face_encoding && !enrollmentState.active) {
        enrollmentState.pendingFaceEncoding = face.face_encoding;
        enrollmentState.pendingEnrollmentPrompted = true;
        updateEnrollmentUI();
        if (face.prompt_enrollment) {
          speak("Unknown person. Say the person's name to enroll.");
          setTimeout(beginEnrollment, 300);
        }
      }
    });

    updateFacesUI(faces.map(f => ({ name: f.name })));

    if (data.navigation) {
      setNarration(`<span style="color:var(--cyan)">↗</span> ${data.navigation}`);
      speak(data.navigation);
    } else if (lines.length > 0) {
      setNarration(lines.join('<br>'));
      if (phrases.length > 0) speak(phrases.join(', '));
    } else {
      setNarration('Path clear ahead', false);
    }

    if (objects.some(d => d.priority)) {
      const hazard = objects.find(d => d.priority);
      showHazard(`${hazard.label} ahead`);
      speak(`Warning — ${hazard.label} ahead`);
    }
  }

  function handleFaceRecognition(data) {
    let lines = [];
    const phrases = [];
    let unknownFaceWithEncoding = null;

    if (data.faces && data.faces.length > 0) {
      data.faces.forEach(face => {
        const icon = face.name === 'unknown' ? '◎' : '◉';
        lines.push(`${icon} ${face.name}`);
        if (face.announce && face.name !== 'unknown' && shouldAnnounceName(face.name)) {
          phrases.push(face.name + ' detected');
        }
        if (face.name === 'unknown' && face.face_encoding) {
          unknownFaceWithEncoding = face;
        }
      });
    }

    if (data.objects && data.objects.length > 0) {
      data.objects.forEach(obj => lines.push(`${obj.label}`));
    }

    updateFacesUI(data.faces || []);
    setNarration(lines.length > 0 ? lines.join('<br>') : 'No faces detected');
    if (phrases.length > 0) speak(phrases.join(', '));

    if (unknownFaceWithEncoding && !enrollmentState.active) {
      enrollmentState.pendingFaceEncoding = unknownFaceWithEncoding.face_encoding;
      enrollmentState.pendingEnrollmentPrompted = true;
      updateEnrollmentUI();
      if (unknownFaceWithEncoding.prompt_enrollment) {
        speak("Unknown person seen. Say their name to enroll.");
        setTimeout(beginEnrollment, 300);
      }
    }
  }

  function handleVisionAnalysis(data) {
    const visionText = data.description || data.text;
    if (visionText) {
      setNarration(visionText);
      speak(visionText);
    } else {
      setNarration('No analysis received', true);
    }
  }

  // =============================================
  // SPEECH
  // =============================================
  function speak(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.rate = 1.0; msg.pitch = 1.0; msg.volume = 1.0;
      window.speechSynthesis.speak(msg);
    }
  }

  // =============================================
  // MODE SWITCHING
  // =============================================
  function switchMode(newMode) {
    if (streaming) stopStreaming();
    currentMode = newMode;
    updateModeChips(newMode);
  }

  function handleModeChip(mode) {
    switchMode(mode);
    if (mode !== 'vision') startStreaming();
    else { captureAndSendFrame(true); }
  }

  function startStreaming() {
    if (streaming) return;
    const config = MODE_CONFIG[currentMode];
    if (!config.interval) { captureAndSendFrame(); return; }

    streaming = true;
    toggleBtn.textContent = 'Stop Scanning';
    toggleBtn.className = 'btn-primary stop';
    updateStatus("Live", true);
    captureAndSendFrame();
    intervalId = setInterval(captureAndSendFrame, config.interval);
    requestWakeLock();
  }

  function stopStreaming() {
    if (!streaming) return;
    streaming = false;
    clearInterval(intervalId);
    intervalId = null;
    toggleBtn.textContent = 'Start Scanning';
    toggleBtn.className = 'btn-primary';
    updateStatus("Idle", false);
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  function handleToggle() { streaming ? stopStreaming() : startStreaming(); }

  async function handleAnalyze() {
    const previousMode = currentMode;
    const wasStreamingBefore = streaming;
    if (streaming) stopStreaming();
    switchMode('vision');
    setProcessing();
    speak("Analyzing scene");
    updateStatus("Analyzing", true);
    await captureAndSendFrame(true);
    switchMode(previousMode);
    if (wasStreamingBefore) startStreaming();
    else updateStatus("Idle", false);
  }

  // =============================================
  // SPEECH RECOGNITION
  // =============================================
  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { voiceFeedback.textContent = 'Voice not supported on this browser'; return false; }

    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-IN';

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('listening');
      voiceFeedback.textContent = 'Listening...';
      voiceFeedback.className = 'voice-feedback';
    };

    recognition.onresult = (event) => {
      (async () => {
        const transcript = event.results[0][0].transcript;
        voiceFeedback.textContent = `"${transcript}"`;
        voiceFeedback.className = 'voice-feedback heard';
        try {
          if (enrollmentState.active && enrollmentState.pendingName && isAffirmative(transcript)) {
            if (streaming) { stopStreaming(); enrollmentState.wasStreaming = true; }
            completeEnrollment(); return;
          }
        } catch(e) {}
        await processVoiceCommand(transcript);
        setTimeout(() => { voiceFeedback.textContent = 'Press to speak a command'; voiceFeedback.className = 'voice-feedback'; }, 3000);
      })();
    };

    recognition.onerror = (event) => {
      let msg = 'Could not recognize speech';
      if (event.error === 'no-speech') msg = 'No speech detected';
      else if (event.error === 'network') msg = 'Network error';
      voiceFeedback.textContent = msg;
      setTimeout(() => { voiceFeedback.textContent = 'Press to speak a command'; voiceFeedback.className = 'voice-feedback'; }, 3000);
    };

    recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); };
    return true;
  }

  initSpeechRecognition();

  micBtn.addEventListener('click', () => {
    if (!recognition) { voiceFeedback.textContent = 'Voice input not available'; return; }
    if (isListening) { recognition.stop(); }
    else {
      try { recognition.start(); }
      catch (e) { recognition.stop(); setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 300); }
    }
  });

  // =============================================
  // VOICE COMMAND PROCESSING
  // =============================================
  async function processVoiceCommand(command) {
    try {
      voiceFeedback.textContent = 'Processing...';

      if (enrollmentState.pendingFaceEncoding && !enrollmentState.active && !enrollmentState.pendingName) {
        if (isAffirmative(command)) {
          enrollmentState.wasStreaming = streaming;
          if (streaming) stopStreaming();
          enrollmentState.active = true;
          enrollmentState.pendingEnrollmentPrompted = false;
          speak("Say the person's name");
          voiceFeedback.textContent = 'Say their name...';
          updateEnrollmentUI(); return;
        } else if (isNegative(command)) {
          speak("Enrollment cancelled");
          enrollmentState.pendingFaceEncoding = null;
          enrollmentState.pendingEnrollmentPrompted = false;
          enrollmentState.active = false;
          updateEnrollmentUI(); return;
        }
      }

      if (enrollmentState.active && enrollmentState.pendingFaceEncoding && !enrollmentState.pendingName) {
        enrollmentState.pendingName = command.trim();
        updateEnrollmentUI();
        speak(`You said ${enrollmentState.pendingName}. Confirm?`); return;
      }

      if (enrollmentState.active && enrollmentState.pendingFaceEncoding && enrollmentState.pendingName) {
        if (isAffirmative(command)) {
          if (streaming) { stopStreaming(); enrollmentState.wasStreaming = true; }
          await completeEnrollment(); return;
        } else if (isNegative(command)) {
          speak("Try again. Say the person's name.");
          enrollmentState.pendingName = null;
          voiceFeedback.textContent = 'Say their name...'; return;
        }
      }

      if (enrollmentState.active && isNegative(command) && /cancel|stop|abort/.test(command.toLowerCase())) {
        const shouldResume = enrollmentState.wasStreaming;
        enrollmentState = { active: false, pendingFaceEncoding: null, pendingName: null, pendingEnrollmentPrompted: false, wasStreaming: false };
        speak('Enrollment cancelled');
        updateEnrollmentUI();
        if (shouldResume) setTimeout(() => startStreaming(), 300); return;
      }

      const response = await fetch(`${backendURL}/voice-command`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command })
      });

      if (!response.ok) throw new Error(`Server error: ${response.status}`);
      const modeData = await response.json();
      await handleVoiceMode(modeData, command);
      voiceFeedback.textContent = 'Press to speak a command';
      voiceFeedback.className = 'voice-feedback';

    } catch (err) {
      voiceFeedback.textContent = 'Failed to process command';
      speak('Sorry, could not process that');
      setTimeout(() => { voiceFeedback.textContent = 'Press to speak a command'; voiceFeedback.className = 'voice-feedback'; }, 2000);
    }
  }

  // =============================================
  // ENROLLMENT COMPLETION
  // =============================================
  async function completeEnrollment() {
    try {
      const name = enrollmentState.pendingName;
      const encoding = enrollmentState.pendingFaceEncoding;
      speak(`Saving ${name}...`);
      voiceFeedback.textContent = 'Saving face...';
      updateEnrollmentUI();

      const response = await fetch(`${backendURL}/api/enroll/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, face_encoding: encoding })
      });

      const result = await response.json();
      if (result.status === 'success') speak(`${name} saved to memory`);
      else speak(`Failed to save ${name}`);

      const shouldResume = enrollmentState.wasStreaming;
      enrollmentState = { active: false, pendingFaceEncoding: null, pendingName: null, pendingEnrollmentPrompted: false, wasStreaming: false };
      voiceFeedback.textContent = 'Press to speak a command';
      voiceFeedback.className = 'voice-feedback';
      updateStatus('Idle', false);
      updateEnrollmentUI();
      if (shouldResume) setTimeout(() => startStreaming(), 500);

    } catch (err) {
      speak('Failed to save. Try again.');
      voiceFeedback.textContent = 'Enrollment failed';
      const shouldResume = enrollmentState.wasStreaming;
      enrollmentState = { active: false, pendingFaceEncoding: null, pendingName: null, pendingEnrollmentPrompted: false, wasStreaming: false };
      updateEnrollmentUI();
      if (shouldResume) setTimeout(() => startStreaming(), 500);
      setTimeout(() => { voiceFeedback.textContent = 'Press to speak a command'; voiceFeedback.className = 'voice-feedback'; }, 2000);
    }
  }

  // =============================================
  // ENROLLMENT UI
  // =============================================
  const enrollmentControls = document.getElementById('enrollmentControls');
  const enrollmentText = document.getElementById('enrollmentText');
  const enrollConfirmBtn = document.getElementById('enrollConfirmBtn');
  const enrollRetryBtn = document.getElementById('enrollRetryBtn');
  const enrollCancelBtn = document.getElementById('enrollCancelBtn');

  function updateEnrollmentUI() {
    if (enrollmentState.active && enrollmentState.pendingName) {
      enrollmentControls.className = 'enrollment-card visible';
      enrollConfirmBtn.textContent = 'Save';
      enrollmentText.textContent = `Save "${enrollmentState.pendingName}" to memory?`;
    } else if (enrollmentState.active && !enrollmentState.pendingName) {
      enrollmentControls.className = 'enrollment-card visible';
      enrollConfirmBtn.textContent = 'Ready';
      enrollmentText.textContent = 'Press mic and say the person\'s name.';
    } else if (enrollmentState.pendingFaceEncoding && !enrollmentState.active) {
      enrollmentControls.className = 'enrollment-card visible';
      enrollConfirmBtn.textContent = 'Enroll';
      enrollmentText.textContent = 'Unknown person detected. Enroll them?';
    } else {
      enrollmentControls.className = 'enrollment-card';
    }
  }

  function beginEnrollment() {
    if (!enrollmentState.pendingFaceEncoding) { speak('No face to enroll.'); return; }
    enrollmentState.wasStreaming = streaming;
    if (streaming) stopStreaming();
    enrollmentState.active = true;
    enrollmentState.pendingEnrollmentPrompted = false;
    enrollmentState.pendingName = null;
    updateEnrollmentUI();
    updateStatus('Enrolling', true);
    voiceFeedback.textContent = 'Say the person\'s name...';
  }

  enrollConfirmBtn.addEventListener('click', () => {
    if (!enrollmentState.active && enrollmentState.pendingFaceEncoding) beginEnrollment();
    else if (enrollmentState.active && enrollmentState.pendingName) completeEnrollment();
    else speak('Press mic and say the name when ready.');
  });

  enrollRetryBtn.addEventListener('click', () => {
    if (enrollmentState.active) {
      enrollmentState.pendingName = null;
      speak("Say the person's name");
      voiceFeedback.textContent = 'Say their name...';
      updateEnrollmentUI();
    }
  });

  enrollCancelBtn.addEventListener('click', () => {
    const shouldResume = enrollmentState.wasStreaming;
    enrollmentState = { active: false, pendingFaceEncoding: null, pendingName: null, pendingEnrollmentPrompted: false, wasStreaming: false };
    updateEnrollmentUI();
    updateStatus('Idle', false);
    speak('Cancelled');
    if (shouldResume) setTimeout(() => startStreaming(), 300);
  });

  // =============================================
  // HANDLE VOICE MODE
  // =============================================
  async function handleVoiceMode(modeData, originalCommand) {
    const { mode, prompt, endpoint } = modeData;
    if (streaming) stopStreaming();

    switch (mode) {
      case 'scan': switchMode('scan'); startStreaming(); speak('Scan mode'); break;
      case 'quickscan': switchMode('quickscan'); startStreaming(); speak('Quick scan'); break;
      case 'face': switchMode('face'); startStreaming(); speak('Face recognition mode'); break;
      case 'vision':
        switchMode('vision');
        setNarration(`<span style="color:var(--text-2)">Q: ${originalCommand}</span>`);
        speak('Analyzing...');
        try {
          const canvas = document.createElement("canvas");
          canvas.width = 640; canvas.height = 480;
          canvas.getContext("2d").drawImage(video, 0, 0, 640, 480);
          const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.8));
          const formData = new FormData();
          formData.append("file", blob, "frame.jpg");
          if (prompt) formData.append("prompt", prompt);
          const response = await fetch(`${backendURL}${endpoint}`, { method: 'POST', body: formData });
          const result = await response.json();
          setNarration(result.text);
          speak(result.text);
        } catch(err) {
          setNarration('Failed to analyze scene');
          speak('Could not analyze scene');
        }
        break;
      case 'interaction':
        switchMode('scan');
        setNarration(prompt || originalCommand);
        speak(prompt || 'Okay');
        break;
      default:
        switchMode('scan');
        speak('Returning to scan');
    }
  }

  // =============================================
  // WAKE LOCK
  // =============================================
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }

  // =============================================
  // CONNECTION CHECK
  // =============================================
  async function checkServerConnection() {
    try {
      const response = await fetch(`${backendURL}/health`);
      await response.json();
      setOnline(true);
      return true;
    } catch {
      setOnline(false);
      return false;
    }
  }

  setTimeout(checkServerConnection, 1000);
  setInterval(() => { if (!streaming) checkServerConnection(); }, 30000);

  // =============================================
  // PAGE VISIBILITY
  // =============================================
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && streaming) stopStreaming();
  });

  // =============================================
  // KEYBOARD SHORTCUTS
  // =============================================
  document.addEventListener('keydown', (e) => {
    if (e.key === 'v' || e.key === 'V') { if (!isListening) micBtn.click(); }
    if (e.key === 's' || e.key === 'S') handleToggle();
    if (e.key === 'a' || e.key === 'A') handleAnalyze();
    if (e.key === '1') handleModeChip('scan');
    if (e.key === '2') handleModeChip('quickscan');
    if (e.key === '3') handleModeChip('face');
  });

  // =============================================
  // INIT
  // =============================================
  setTimeout(() => speak('Neytra ready'), 1500);
</script>
</body>
